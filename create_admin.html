<!DOCTYPE html>
<html>
<head>
    <title>Create Admin</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>Admin Account Creator</h2>
    <p>Your local internet provider is blocking the database connection. Let's create the admin using your Live Render Backend instead!</p>
    
    <label>Paste your Render Backend URL here:</label>
    <input type="text" id="backendUrl" placeholder="https://queue-management-system-xxxx.onrender.com" />
    
    <button onclick="createAdmin()">Create admin@queue.com</button>

    <div id="result"></div>

    <script>
        async function createAdmin() {
            const urlInput = document.getElementById('backendUrl').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!urlInput) {
                resultDiv.innerHTML = "Please enter the Render URL first!";
                resultDiv.className = "error";
                return;
            }

            const baseUrl = urlInput.endsWith('/') ? urlInput.slice(0, -1) : urlInput;
            
            resultDiv.innerHTML = "Creating admin... Please wait.";
            resultDiv.className = "";

            try {
                const response = await fetch(`${baseUrl}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: "Super Admin",
                        email: "admin@queue.com",
                        password: "admin123",
                        role: "company_super_admin",
                        tenantType: "bank"
                    })
                });

                const data = await response.json();
                
                if (response.ok || (data.error && data.error.includes("already exists"))) {
                    resultDiv.innerHTML = "✅ Success! The admin@queue.com account is ready. Password is: admin123";
                    resultDiv.className = "success";
                } else {
                    resultDiv.innerHTML = "❌ Failed: " + JSON.stringify(data);
                    resultDiv.className = "error";
                }
            } catch (err) {
                resultDiv.innerHTML = "❌ Network Error: Make sure the URL is correct and the Render backend is running. " + err.message;
                resultDiv.className = "error";
            }
        }
    </script>
</body>
</html>
